{% extends 'blog/base.html' %}
{% block title %}Delete Post{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger shadow-sm">
      <div class="card-body text-center p-4">
        <i class="bi bi-trash display-4 text-danger"></i>
        <h4 class="mt-3">Delete this post?</h4>
        <p class="text-muted">"{{ object.title }}" will be permanently deleted.</p>
        <form method="POST">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
          <a href="{% url 'blog-home' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
