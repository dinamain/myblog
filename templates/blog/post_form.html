{% extends 'blog/base.html' %}

{% block title %}{% if object %}Edit Post{% else %}New Post{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h3 class="mb-4 fw-bold">
          <i class="bi bi-pencil-square me-2"></i>
          {% if object %}Edit Post{% else %}Create New Post{% endif %}
        </h3>
        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Title</label>
            <input type="text" name="title" class="form-control"
              value="{{ form.title.value|default:'' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Content</label>
            <textarea name="content" class="form-control" rows="8" required>{{ form.content.value|default:'' }}</textarea>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Cover Image <span class="text-muted fw-normal">(optional)</span></label>
            <input type="file" name="image" class="form-control" accept="image/*">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              {% if object %}Save Changes{% else %}Publish Post{% endif %}
            </button>
            <a href="{% url 'blog-home' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
